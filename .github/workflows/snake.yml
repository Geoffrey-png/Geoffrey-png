# =====================================================================
# 贪吃蛇贡献图动画 GitHub Action
# 用法：将本文件放到你的用户名同名仓库（例如 Geoffrey-png/Geoffrey-png）
# 路径：.github/workflows/snake.yml
# 之后每天会自动生成 SVG 并推送到 output 分支，README 即可引用
# =====================================================================

name: Generate Snake

on:
  schedule:
    # 每天 UTC 0 点（北京时间 8 点）运行一次
    - cron: "0 0 * * *"
  # 允许手动触发
  workflow_dispatch:

# 允许 Action 写入仓库
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 生成贪吃蛇 SVG
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 2. 推送到 output 分支
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
